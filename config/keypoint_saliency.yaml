GENERAL:
  experiment: keypoint_saliency
  seed: 0

DATA:
  # data path
  anno_dir: ../KeypointNet/annotations/all.json
  split_root: ../KeypointNet/splits/split_2
  pcd_root: ../KeypointNet/pcds
  # sample
  class_name: airplane
  num_points: 2048
  # augmentation
  augmentation: True
  normalize_pc: False
  # landmark
  landmark_std: 0.1

STRUCTURE:
  k: 20
  input_channels: 3
  query_num: 50
  n_edgeconvs_backbone: 5
  emb_dims: 1024
  global_pool_backbone: avg  # max or avg
  norm: instance
  dropout: 0.
  dynamic: False

TRAIN:
  max_epochs: 100
  weight_decay: 0.0001
  # batch_size per gpu
  batch_size: 2
  load_from_checkpoint:
  resume_from_checkpoint:

  # one cycle lr scheduler
  lr_max: 0.0001 #0.0001
  pct_start: 0.1    # percentage of the cycle spent increasing lr
  div_factor: 25    # determine the initial lr (lr_max / div_factor)
  final_div_factor: 1e4 #1e4   # determine the final lr (lr_max / final_div_factor)
  start_epoch: 0

  train_file: train.txt
  train_workers: 2

  val_file: val.txt
  val_workers: 2

  test_file: test.txt
  test_workers: 0

  debug: False
